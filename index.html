<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الحاسبة الناطقة</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 0.3s, color 0.3s;
            margin: 0;
            padding: 0;
            overflow: hidden;
            touch-action: manipulation;
        }
        .dark {
            background-color: #111827;
            color: #f9fafb;
        }
        .light {
            background-color: #f3f4f6;
            color: #111827;
        }
        .display-area {
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            word-wrap: break-word;
            word-break: break-all;
            padding: 1.5rem;
            overflow-y: auto;
        }
        .btn {
            transition: transform 0.1s, background-color 0.2s, filter 0.2s;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active {
            transform: scale(0.92);
            filter: brightness(0.9);
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 2px;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
        }
    </style>
</head>
<body class="light">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // SVG Icons
        const SunIcon = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>;
        const MoonIcon = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>;
        const MicIcon = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>;
        const HistoryIcon = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
        const DeleteIcon = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path><line x1="18" y1="9" x2="12" y2="15"></line><line x1="12" y1="9" x2="18" y2="15"></line></svg>;
        const VolumeIcon = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>;
        const VolumeXIcon = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>;
        const CopyIcon = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>;

        function App() {
            const [expression, setExpression] = useState("");
            const [result, setResult] = useState("");
            const [history, setHistory] = useState([]);
            const [isDark, setIsDark] = useState(false);
            const [showHistory, setShowHistory] = useState(false);
            const [isListening, setIsListening] = useState(false);
            const [speechEnabled, setSpeechEnabled] = useState(true);
            const [lang, setLang] = useState('ar'); // 'ar' or 'en'
            
            const displayRef = useRef(null);
            
            // Translations
            const t = {
                history: lang === 'ar' ? 'السجل' : 'History',
                clearHistory: lang === 'ar' ? 'مسح السجل' : 'Clear History',
                noHistory: lang === 'ar' ? 'لا يوجد سجل' : 'No history',
                copy: lang === 'ar' ? 'نسخ' : 'Copy',
                error: lang === 'ar' ? 'خطأ' : 'Error',
                micError: lang === 'ar' ? 'عذراً، متصفحك لا يدعم التعرف على الصوت.' : 'Speech recognition not supported.'
            };

            // Setup Speech Recognition
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = SpeechRecognition ? new SpeechRecognition() : null;
            
            if (recognition) {
                recognition.continuous = false;
                recognition.lang = lang === 'ar' ? 'ar-SA' : 'en-US';
                recognition.interimResults = false;
                recognition.maxAlternatives = 1;
            }

            useEffect(() => {
                document.body.className = isDark ? 'dark' : 'light';
            }, [isDark]);

            useEffect(() => {
                if (displayRef.current) {
                    displayRef.current.scrollTop = displayRef.current.scrollHeight;
                }
            }, [expression, result]);

            const speak = (text) => {
                if (!speechEnabled || !window.speechSynthesis) return;
                
                window.speechSynthesis.cancel();
                
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = lang === 'ar' ? 'ar-SA' : 'en-US';
                
                const voices = window.speechSynthesis.getVoices();
                const targetVoice = voices.find(voice => voice.lang.startsWith(lang));
                if (targetVoice) {
                    utterance.voice = targetVoice;
                }
                
                window.speechSynthesis.speak(utterance);
            };

            const toggleListening = () => {
                if (!recognition) {
                    alert(t.micError);
                    return;
                }

                if (isListening) {
                    recognition.stop();
                    setIsListening(false);
                } else {
                    try {
                        recognition.start();
                        setIsListening(true);
                        
                        recognition.onresult = (event) => {
                            const transcript = event.results[0][0].transcript;
                            handleVoiceInput(transcript);
                            setIsListening(false);
                        };
                        
                        recognition.onerror = (event) => {
                            console.error("Speech recognition error", event.error);
                            setIsListening(false);
                        };
                        
                        recognition.onend = () => {
                            setIsListening(false);
                        };
                    } catch (e) {
                        console.error(e);
                        setIsListening(false);
                    }
                }
            };

            const handleVoiceInput = (text) => {
                let processedText = text.toLowerCase()
                    // English replacements
                    .replace(/plus/g, '+')
                    .replace(/minus/g, '-')
                    .replace(/times/g, '*')
                    .replace(/multiplied by/g, '*')
                    .replace(/divided by/g, '/')
                    .replace(/over/g, '/')
                    .replace(/equals/g, '=')
                    .replace(/zero/g, '0')
                    .replace(/one/g, '1')
                    .replace(/two/g, '2')
                    .replace(/three/g, '3')
                    .replace(/four/g, '4')
                    .replace(/five/g, '5')
                    .replace(/six/g, '6')
                    .replace(/seven/g, '7')
                    .replace(/eight/g, '8')
                    .replace(/nine/g, '9')
                    .replace(/point/g, '.')
                    .replace(/dot/g, '.')
                    // Arabic replacements
                    .replace(/زائد/g, '+')
                    .replace(/ناقص/g, '-')
                    .replace(/في/g, '*')
                    .replace(/ضرب/g, '*')
                    .replace(/على/g, '/')
                    .replace(/تقسيم/g, '/')
                    .replace(/قسمة/g, '/')
                    .replace(/يساوي/g, '=')
                    .replace(/صفر/g, '0')
                    .replace(/واحد/g, '1')
                    .replace(/اثنان/g, '2')
                    .replace(/اثنين/g, '2')
                    .replace(/ثلاثة/g, '3')
                    .replace(/أربعة/g, '4')
                    .replace(/خمسة/g, '5')
                    .replace(/ستة/g, '6')
                    .replace(/سبعة/g, '7')
                    .replace(/ثمانية/g, '8')
                    .replace(/تسعة/g, '9')
                    .replace(/فاصلة/g, '.')
                    .replace(/\s+/g, '');

                const validMath = processedText.match(/[0-9+\-*/.]/g);
                if (validMath) {
                    const newExpr = validMath.join('');
                    setExpression(newExpr);
                    if (processedText.includes('=')) {
                        calculateResult(newExpr);
                    }
                }
            };

            const handleInput = (val) => {
                setExpression(prev => prev + val);
            };

            const handleDelete = () => {
                setExpression(prev => prev.slice(0, -1));
            };

            const handleClear = () => {
                setExpression("");
                setResult("");
            };

            const calculateResult = (exprToCalc = expression) => {
                if (!exprToCalc) return;
                try {
                    const safeExpr = exprToCalc.replace(/×/g, '*').replace(/÷/g, '/');
                    const evalResult = Function('"use strict";return (' + safeExpr + ')')();
                    
                    const formattedResult = Number.isInteger(evalResult) 
                        ? evalResult.toString() 
                        : parseFloat(evalResult.toFixed(8)).toString();
                    
                    setResult(formattedResult);
                    speak(formattedResult);
                    
                    setHistory(prev => [{ expr: exprToCalc, res: formattedResult }, ...prev].slice(0, 20));
                } catch (error) {
                    setResult(t.error);
                    speak(t.error);
                }
            };

            const copyToClipboard = () => {
                const textToCopy = `${expression} = ${result}`;
                navigator.clipboard.writeText(textToCopy).then(() => {
                    // Optional feedback
                });
            };

            // Colors matching the screenshot
            const opColor = "bg-[#f97316] text-white"; // Orange
            const topColor = "bg-[#e2e8f0] text-gray-800 dark:bg-gray-700 dark:text-gray-200"; // Light gray
            const numColor = "bg-white text-gray-900 dark:bg-gray-800 dark:text-white"; // White

            // Standard LTR Keypad Layout
            const buttons = [
                { label: 'AC', action: handleClear, color: topColor, colSpan: 1 },
                { label: '(', action: () => handleInput('('), color: topColor, colSpan: 1 },
                { label: ')', action: () => handleInput(')'), color: topColor, colSpan: 1 },
                { label: '÷', action: () => handleInput('/'), color: opColor, colSpan: 1 },
                
                { label: '7', action: () => handleInput('7'), color: numColor, colSpan: 1 },
                { label: '8', action: () => handleInput('8'), color: numColor, colSpan: 1 },
                { label: '9', action: () => handleInput('9'), color: numColor, colSpan: 1 },
                { label: '×', action: () => handleInput('*'), color: opColor, colSpan: 1 },
                
                { label: '4', action: () => handleInput('4'), color: numColor, colSpan: 1 },
                { label: '5', action: () => handleInput('5'), color: numColor, colSpan: 1 },
                { label: '6', action: () => handleInput('6'), color: numColor, colSpan: 1 },
                { label: '-', action: () => handleInput('-'), color: opColor, colSpan: 1 },
                
                { label: '1', action: () => handleInput('1'), color: numColor, colSpan: 1 },
                { label: '2', action: () => handleInput('2'), color: numColor, colSpan: 1 },
                { label: '3', action: () => handleInput('3'), color: numColor, colSpan: 1 },
                { label: '+', action: () => handleInput('+'), color: opColor, colSpan: 1 },
                
                { label: <DeleteIcon />, action: handleDelete, color: topColor, colSpan: 1 },
                { label: '0', action: () => handleInput('0'), color: numColor, colSpan: 1 },
                { label: '.', action: () => handleInput('.'), color: numColor, colSpan: 1 },
                { label: '=', action: () => calculateResult(), color: opColor, colSpan: 1 },
            ];

            return (
                <div className={`h-screen w-full flex flex-col ${isDark ? 'bg-gray-900' : 'bg-[#f8fafc]'}`}>
                    
                    {/* Top Bar (Always LTR layout) */}
                    <div className="flex justify-between items-center p-4">
                        <div className="flex gap-3">
                            <button onClick={() => setShowHistory(!showHistory)} className={`p-3 rounded-full transition-colors ${showHistory ? 'bg-gray-200 dark:bg-gray-700' : 'bg-gray-100 dark:bg-gray-800'} text-gray-600 dark:text-gray-300`}>
                                <HistoryIcon />
                            </button>
                            <button onClick={() => setIsDark(!isDark)} className="p-3 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 transition-colors">
                                {isDark ? <SunIcon /> : <MoonIcon />}
                            </button>
                            <button onClick={() => setLang(lang === 'ar' ? 'en' : 'ar')} className="px-3 py-2 rounded-full font-bold text-sm bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 transition-colors">
                                {lang === 'ar' ? 'EN' : 'AR'}
                            </button>
                        </div>
                        <div className="flex gap-3">
                            <button onClick={() => setSpeechEnabled(!speechEnabled)} className={`p-3 rounded-full transition-colors bg-gray-100 dark:bg-gray-800 ${speechEnabled ? 'text-gray-600 dark:text-gray-300' : 'text-gray-400'}`}>
                                {speechEnabled ? <VolumeIcon /> : <VolumeXIcon />}
                            </button>
                            <button 
                                onClick={toggleListening}
                                className={`p-3 rounded-full transition-colors ${isListening ? 'bg-red-500 text-white animate-pulse' : 'bg-[#f97316] text-white'}`}
                            >
                                <MicIcon />
                            </button>
                        </div>
                    </div>

                    {/* Copy Button (Adapts to language) */}
                    <div className="flex justify-end px-4" dir={lang === 'ar' ? 'rtl' : 'ltr'}>
                        <button onClick={copyToClipboard} className="flex items-center gap-2 px-3 py-1.5 bg-gray-100 dark:bg-gray-800 rounded-full text-sm text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                            <span>{t.copy}</span>
                            <CopyIcon />
                        </button>
                    </div>

                    {/* Main Content Area */}
                    <div className="flex-1 flex flex-col relative overflow-hidden">
                        
                        {/* History Panel (Full Screen Overlay) */}
                        {showHistory && (
                            <div className={`absolute inset-0 z-50 flex flex-col ${isDark ? 'bg-gray-900/95' : 'bg-white/95'} backdrop-blur-md transition-all`} dir={lang === 'ar' ? 'rtl' : 'ltr'}>
                                <div className="p-4 border-b border-gray-200 dark:border-gray-800 flex justify-between items-center">
                                    <h2 className="text-xl font-bold text-gray-900 dark:text-white">{t.history}</h2>
                                    <button onClick={() => setHistory([])} className="text-sm text-red-500 hover:underline font-medium">{t.clearHistory}</button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-4 space-y-3">
                                    {history.length === 0 ? (
                                        <p className="text-center text-gray-500 mt-10">{t.noHistory}</p>
                                    ) : (
                                        history.map((item, idx) => (
                                            <div key={idx} className={`cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-800 p-3 rounded-xl transition-colors ${lang === 'ar' ? 'text-right' : 'text-left'}`} onClick={() => { setExpression(item.expr); setResult(item.res); setShowHistory(false); }}>
                                                <div className="text-gray-500 text-sm mb-1" dir="ltr">{item.expr}</div>
                                                <div className="text-2xl font-bold text-[#f97316]" dir="ltr">{item.res}</div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        )}

                        {/* Display Area */}
                        <div 
                            ref={displayRef}
                            className="display-area flex-1 px-6 pb-2"
                        >
                            <div className="w-full flex flex-col items-end">
                                <div className="text-gray-500 dark:text-gray-400 min-h-[2rem] tracking-wider mb-1 break-all text-right" style={{ fontSize: '1.5rem', direction: 'ltr' }}>
                                    {expression.replace(/\*/g, '×').replace(/\//g, '÷') || '\u00A0'}
                                </div>
                                <div className="font-bold tracking-tight text-gray-900 dark:text-white break-all text-right" style={{ fontSize: '3rem', lineHeight: '1.1', direction: 'ltr' }}>
                                    {result ? `= ${result}` : '\u00A0'}
                                </div>
                            </div>
                        </div>

                        {/* Keypad (Always LTR) */}
                        <div className={`p-4 pb-8 rounded-t-[2rem] ${isDark ? 'bg-gray-900' : 'bg-[#f8fafc]'}`}>
                            <div className="grid grid-cols-4 gap-3" dir="ltr">
                                {buttons.map((btn, idx) => (
                                    <button
                                        key={idx}
                                        onClick={btn.action}
                                        className={`btn h-16 sm:h-20 rounded-full text-2xl sm:text-3xl font-medium flex items-center justify-center shadow-sm ${btn.color}`}
                                        style={{ gridColumn: `span ${btn.colSpan} / span ${btn.colSpan}` }}
                                    >
                                        {btn.label}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
