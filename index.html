<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الحاسبة الناطقة</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 0.3s, color 0.3s;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .dark {
            background-color: #111827;
            color: #f9fafb;
        }
        .light {
            background-color: #f3f4f6;
            color: #111827;
        }
        .display-area {
            min-height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            word-wrap: break-word;
            word-break: break-all;
            padding: 1.5rem;
            border-radius: 1rem;
            overflow-y: auto;
        }
        .btn {
            transition: transform 0.1s, background-color 0.2s;
            user-select: none;
        }
        .btn:active {
            transform: scale(0.92);
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body class="dark">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // SVG Icons
        const SunIcon = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>;
        const MoonIcon = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>;
        const MicIcon = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>;
        const HistoryIcon = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
        const DeleteIcon = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path><line x1="18" y1="9" x2="12" y2="15"></line><line x1="12" y1="9" x2="18" y2="15"></line></svg>;
        const VolumeIcon = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>;
        const VolumeXIcon = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>;

        function App() {
            const [expression, setExpression] = useState("");
            const [result, setResult] = useState("");
            const [history, setHistory] = useState([]);
            const [isDark, setIsDark] = useState(true);
            const [showHistory, setShowHistory] = useState(false);
            const [isListening, setIsListening] = useState(false);
            const [speechEnabled, setSpeechEnabled] = useState(true);
            
            const displayRef = useRef(null);
            
            // Setup Speech Recognition
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = SpeechRecognition ? new SpeechRecognition() : null;
            
            if (recognition) {
                recognition.continuous = false;
                recognition.lang = 'ar-SA';
                recognition.interimResults = false;
                recognition.maxAlternatives = 1;
            }

            useEffect(() => {
                document.body.className = isDark ? 'dark' : 'light';
            }, [isDark]);

            useEffect(() => {
                if (displayRef.current) {
                    displayRef.current.scrollTop = displayRef.current.scrollHeight;
                }
            }, [expression, result]);

            const speak = (text) => {
                if (!speechEnabled || !window.speechSynthesis) return;
                
                window.speechSynthesis.cancel();
                
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ar-SA';
                
                const voices = window.speechSynthesis.getVoices();
                const arabicVoice = voices.find(voice => voice.lang.startsWith('ar'));
                if (arabicVoice) {
                    utterance.voice = arabicVoice;
                }
                
                window.speechSynthesis.speak(utterance);
            };

            const toggleListening = () => {
                if (!recognition) {
                    alert("عذراً، متصفحك لا يدعم التعرف على الصوت.");
                    return;
                }

                if (isListening) {
                    recognition.stop();
                    setIsListening(false);
                } else {
                    try {
                        recognition.start();
                        setIsListening(true);
                        
                        recognition.onresult = (event) => {
                            const transcript = event.results[0][0].transcript;
                            handleVoiceInput(transcript);
                            setIsListening(false);
                        };
                        
                        recognition.onerror = (event) => {
                            console.error("Speech recognition error", event.error);
                            setIsListening(false);
                        };
                        
                        recognition.onend = () => {
                            setIsListening(false);
                        };
                    } catch (e) {
                        console.error(e);
                        setIsListening(false);
                    }
                }
            };

            const handleVoiceInput = (text) => {
                let processedText = text
                    .replace(/زائد/g, '+')
                    .replace(/ناقص/g, '-')
                    .replace(/في/g, '*')
                    .replace(/ضرب/g, '*')
                    .replace(/على/g, '/')
                    .replace(/تقسيم/g, '/')
                    .replace(/قسمة/g, '/')
                    .replace(/يساوي/g, '=')
                    .replace(/صفر/g, '0')
                    .replace(/واحد/g, '1')
                    .replace(/اثنان/g, '2')
                    .replace(/اثنين/g, '2')
                    .replace(/ثلاثة/g, '3')
                    .replace(/أربعة/g, '4')
                    .replace(/خمسة/g, '5')
                    .replace(/ستة/g, '6')
                    .replace(/سبعة/g, '7')
                    .replace(/ثمانية/g, '8')
                    .replace(/تسعة/g, '9')
                    .replace(/فاصلة/g, '.')
                    .replace(/\s+/g, '');

                const validMath = processedText.match(/[0-9+\-*/.]/g);
                if (validMath) {
                    const newExpr = validMath.join('');
                    setExpression(newExpr);
                    if (processedText.includes('=')) {
                        calculateResult(newExpr);
                    }
                }
            };

            const handleInput = (val) => {
                setExpression(prev => prev + val);
            };

            const handleDelete = () => {
                setExpression(prev => prev.slice(0, -1));
            };

            const handleClear = () => {
                setExpression("");
                setResult("");
            };

            const calculateResult = (exprToCalc = expression) => {
                if (!exprToCalc) return;
                try {
                    const safeExpr = exprToCalc.replace(/×/g, '*').replace(/÷/g, '/');
                    const evalResult = Function('"use strict";return (' + safeExpr + ')')();
                    
                    const formattedResult = Number.isInteger(evalResult) 
                        ? evalResult.toString() 
                        : parseFloat(evalResult.toFixed(8)).toString();
                    
                    setResult(formattedResult);
                    speak(formattedResult);
                    
                    setHistory(prev => [{ expr: exprToCalc, res: formattedResult }, ...prev].slice(0, 20));
                } catch (error) {
                    setResult("خطأ");
                    speak("خطأ");
                }
            };

            const buttons = [
                { label: 'C', action: handleClear, color: 'text-red-500 bg-red-100 dark:bg-red-900/30 dark:text-red-400' },
                { label: '(', action: () => handleInput('('), color: 'text-blue-500 bg-blue-100 dark:bg-blue-900/30 dark:text-blue-400' },
                { label: ')', action: () => handleInput(')'), color: 'text-blue-500 bg-blue-100 dark:bg-blue-900/30 dark:text-blue-400' },
                { label: '÷', action: () => handleInput('/'), color: 'text-blue-500 bg-blue-100 dark:bg-blue-900/30 dark:text-blue-400' },
                
                { label: '7', action: () => handleInput('7'), color: 'bg-gray-200 dark:bg-gray-800' },
                { label: '8', action: () => handleInput('8'), color: 'bg-gray-200 dark:bg-gray-800' },
                { label: '9', action: () => handleInput('9'), color: 'bg-gray-200 dark:bg-gray-800' },
                { label: '×', action: () => handleInput('*'), color: 'text-blue-500 bg-blue-100 dark:bg-blue-900/30 dark:text-blue-400' },
                
                { label: '4', action: () => handleInput('4'), color: 'bg-gray-200 dark:bg-gray-800' },
                { label: '5', action: () => handleInput('5'), color: 'bg-gray-200 dark:bg-gray-800' },
                { label: '6', action: () => handleInput('6'), color: 'bg-gray-200 dark:bg-gray-800' },
                { label: '-', action: () => handleInput('-'), color: 'text-blue-500 bg-blue-100 dark:bg-blue-900/30 dark:text-blue-400' },
                
                { label: '1', action: () => handleInput('1'), color: 'bg-gray-200 dark:bg-gray-800' },
                { label: '2', action: () => handleInput('2'), color: 'bg-gray-200 dark:bg-gray-800' },
                { label: '3', action: () => handleInput('3'), color: 'bg-gray-200 dark:bg-gray-800' },
                { label: '+', action: () => handleInput('+'), color: 'text-blue-500 bg-blue-100 dark:bg-blue-900/30 dark:text-blue-400' },
                
                { label: '.', action: () => handleInput('.'), color: 'bg-gray-200 dark:bg-gray-800' },
                { label: '0', action: () => handleInput('0'), color: 'bg-gray-200 dark:bg-gray-800' },
                { label: <DeleteIcon />, action: handleDelete, color: 'bg-gray-200 dark:bg-gray-800 flex justify-center items-center' },
                { label: '=', action: () => calculateResult(), color: 'bg-blue-500 text-white dark:bg-blue-600' },
            ];

            return (
                <div className={`h-screen w-full flex flex-col items-center justify-center p-2 sm:p-4 ${isDark ? 'bg-gray-950' : 'bg-gray-200'}`}>
                    <div className={`w-full max-w-md h-full max-h-[850px] rounded-[2rem] shadow-2xl overflow-hidden flex flex-col relative ${isDark ? 'bg-gray-900 border-gray-800' : 'bg-white border-gray-200'} border`}>
                        
                        {/* Header */}
                        <div className="flex justify-between items-center p-4 border-b border-gray-200 dark:border-gray-800">
                            <div className="flex gap-3">
                                <button onClick={() => setShowHistory(!showHistory)} className={`p-2 rounded-full transition-colors ${showHistory ? 'bg-blue-100 text-blue-500 dark:bg-blue-900/50 dark:text-blue-400' : 'hover:bg-gray-200 dark:hover:bg-gray-800 text-gray-600 dark:text-gray-300'}`}>
                                    <HistoryIcon />
                                </button>
                                <button onClick={() => setSpeechEnabled(!speechEnabled)} className={`p-2 rounded-full transition-colors ${speechEnabled ? 'text-green-500 hover:bg-gray-200 dark:hover:bg-gray-800' : 'text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-800'}`}>
                                    {speechEnabled ? <VolumeIcon /> : <VolumeXIcon />}
                                </button>
                            </div>
                            <button onClick={() => setIsDark(!isDark)} className="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 text-gray-600 dark:text-gray-300 transition-colors">
                                {isDark ? <SunIcon /> : <MoonIcon />}
                            </button>
                        </div>

                        {/* Main Content Area */}
                        <div className="flex-1 flex flex-col relative overflow-hidden">
                            
                            {/* History Panel */}
                            {showHistory && (
                                <div className={`absolute inset-0 z-20 flex flex-col ${isDark ? 'bg-gray-900/95' : 'bg-white/95'} backdrop-blur-md transition-all`}>
                                    <div className="p-4 border-b border-gray-200 dark:border-gray-800 flex justify-between items-center">
                                        <h2 className="text-xl font-bold">السجل</h2>
                                        <button onClick={() => setHistory([])} className="text-sm text-red-500 hover:underline font-medium">مسح السجل</button>
                                    </div>
                                    <div className="flex-1 overflow-y-auto p-4 space-y-3">
                                        {history.length === 0 ? (
                                            <p className="text-center text-gray-500 mt-10">لا يوجد سجل</p>
                                        ) : (
                                            history.map((item, idx) => (
                                                <div key={idx} className="text-right cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-800 p-3 rounded-xl transition-colors" onClick={() => { setExpression(item.expr); setResult(item.res); setShowHistory(false); }}>
                                                    <div className="text-gray-500 text-sm mb-1">{item.expr}</div>
                                                    <div className="text-2xl font-bold text-blue-500">{item.res}</div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>
                            )}

                            {/* Display Area */}
                            <div 
                                ref={displayRef}
                                className={`display-area flex-1 ${isDark ? 'bg-gray-800/40' : 'bg-gray-50'} m-4 mb-8`}
                            >
                                <div className="text-right w-full">
                                    <div className="text-gray-500 dark:text-gray-400 min-h-[2rem] tracking-wider mb-2" style={{ fontSize: '1.25rem' }}>
                                        {expression || '\u00A0'}
                                    </div>
                                    <div className="font-bold tracking-tight text-gray-900 dark:text-white" style={{ fontSize: '2.5rem', lineHeight: '1.1' }}>
                                        {result || '\u00A0'}
                                    </div>
                                </div>
                            </div>

                            {/* Mic Button */}
                            <div className="flex justify-center absolute left-0 right-0 z-10" style={{ bottom: '380px' }}>
                                <button 
                                    onClick={toggleListening}
                                    className={`p-4 rounded-full shadow-xl transform transition-all duration-300 ${isListening ? 'bg-red-500 text-white scale-110 animate-pulse shadow-red-500/50' : 'bg-blue-500 text-white hover:bg-blue-600 hover:scale-105 shadow-blue-500/30'}`}
                                >
                                    <MicIcon />
                                </button>
                            </div>

                            {/* Keypad */}
                            <div className="grid grid-cols-4 gap-2 sm:gap-3 p-4 pt-6 bg-transparent mt-auto">
                                {buttons.map((btn, idx) => (
                                    <button
                                        key={idx}
                                        onClick={btn.action}
                                        className={`btn h-16 sm:h-18 rounded-2xl text-2xl sm:text-3xl font-medium flex items-center justify-center ${btn.color}`}
                                    >
                                        {btn.label}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
